<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Гистограм</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="spinner-overlay" class="spinner-overlay hidden">
    <div class="spinner"></div>
  </div>

  <div id="error-banner" class="error-banner hidden"></div>

  <header>
    <div class="header-inner">
      <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M51,17c-3.3086,0-6,2.6914-6,6,0,2.4388,1.4647,4.5383,3.5587,5.4756-.9632,3.502-2.6105,7.0683-3.6998,7.0683-1.1514,0-2.6665-3.5146-4.5024-10.4453l-.1074-.4043c-.1851-.6973-.3442-1.4043-.5-2.0938-.7397-3.2793-1.5044-6.6709-4.8198-6.6709-3.4756,0-4.812,5.0879-5.5303,7.8203-.0845,.3232-.1577,.6025-.2222,.8203-.7681,2.6016-1.9028,7.7715-3,12.7725l-.7349,3.3379c-1.1694,5.2812-1.7749,5.2812-2.6812,5.2812-.6691-.0701-2.8653-2.0901-4.897-4.4622,.7118-.9864,1.1363-2.1931,1.1363-3.4998,0-3.3086-2.6914-6-6-6s-6,2.6914-6,6,2.6914,6,6,6c1.2768,0,2.4593-.4039,3.433-1.0864,1.672,1.9514,4.5966,5.0483,6.317,5.0483,2.6763,0,3.5068-1.71,4.645-6.8496l.7354-3.3408c1.0894-4.9668,2.2163-10.1016,2.9644-12.6348,.0688-.2334,.1479-.5322,.2388-.8779,.4976-1.8936,1.6626-6.3291,3.5957-6.3291,1.5469,0,2.0854,1.6367,2.8691,5.1113,.1606,.7139,.3262,1.4453,.5181,2.167l.1064,.4023c1.666,6.2891,3.4121,11.9336,6.436,11.9336,2.9559,0,4.8743-5.7452,5.6384-8.5694,.1661,.0139,.333,.0255,.5027,.0255,3.3086,0,6-2.6914,6-6s-2.6914-6-6-6ZM9,38c0-2.2061,1.7944-4,4-4s4,1.7939,4,4-1.7944,4-4,4-4-1.7939-4-4Zm42-11c-2.2056,0-4-1.7939-4-4s1.7944-4,4-4,4,1.7939,4,4-1.7944,4-4,4Z"/>
      </svg>
      <span class="app-name">Гистограм</span>
    </div>
  </header>

  <main>
    <div class="workspace">

      <div class="card image-card">
        <div class="card-header">
          <span class="card-title">Исходное изображение</span>
          <button id="btn-clear" class="icon-btn hidden" title="Очистить">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="image-fill-area">
          <div id="drop-zone" class="drop-zone">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
            </svg>
            <p class="drop-text">Перетащите изображение<br/>или нажмите для выбора</p>
            <p class="drop-hint">JPEG, PNG, WebP</p>
            <input type="file" id="file-input" accept="image/*" />
          </div>
          <img id="original-preview" class="fill-img hidden" alt="Оригинал" />
        </div>
      </div>

      <div class="card histogram-card right-card locked" id="histogram-card">
        <div class="card-header">
          <span class="card-title">Гистограмма</span>
        </div>
        <div class="histograms-grid">
          <div class="mini-chart">
            <span class="mini-chart-label" style="color:#aab">L</span>
            <canvas id="chart-lum"></canvas>
          </div>
          <div class="mini-chart">
            <span class="mini-chart-label" style="color:#dc4646">R</span>
            <canvas id="chart-r"></canvas>
          </div>
          <div class="mini-chart">
            <span class="mini-chart-label" style="color:#3cbe5a">G</span>
            <canvas id="chart-g"></canvas>
          </div>
          <div class="mini-chart">
            <span class="mini-chart-label" style="color:#4682f0">B</span>
            <canvas id="chart-b"></canvas>
          </div>
        </div>
      </div>

      <div class="card result-card">
        <div class="card-header">
          <span class="card-title">Результат</span>
        </div>
        <div class="image-fill-area">
          <img id="result-preview" class="fill-img hidden" alt="Результат" />
        </div>
      </div>

      <div class="card operations-card right-card locked" id="operations-card">
        <div class="card-header">
          <span class="card-title">Настройки</span>
          <div class="header-actions">
            <button id="btn-reset" class="icon-btn hidden" title="Сбросить все настройки">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
              </svg>
            </button>
            <button id="btn-download" class="icon-btn hidden" title="Скачать результат">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="ops-scroll">

          <div class="ops-section">
            <div class="ops-section-header">
              <span class="ops-section-title">Экспозиция</span>
              <button class="auto-btn" id="btn-auto-exposure">Авто</button>
            </div>
            <div class="sliders-group">
              <div class="param-row">
                <div class="param-label">
                  <span>Яркость</span>
                  <span class="param-val" id="brightness-val">0</span>
                </div>
                <input type="range" id="brightness" min="-100" max="100" step="1" value="0" />
                <div class="param-axis">
                  <span>темнее</span><span>светлее</span>
                </div>
              </div>
              <div class="param-row">
                <div class="param-label">
                  <span>Контраст</span>
                  <span class="param-val" id="contrast-val">0</span>
                </div>
                <input type="range" id="contrast" min="-100" max="100" step="1" value="0" />
                <div class="param-axis">
                  <span>мягче</span><span>резче</span>
                </div>
              </div>
            </div>
          </div>

          <div class="section-divider"></div>

          <div class="ops-section">
            <div class="ops-section-header">
              <span class="ops-section-title">Баланс белого</span>
              <button class="auto-btn" id="btn-auto-wb">Авто</button>
            </div>
            <div class="sliders-group">
              <div class="param-row">
                <div class="param-label">
                  <span>Температура</span>
                  <span class="param-val" id="temperature-val">0</span>
                </div>
                <input type="range" id="temperature" min="-100" max="100" step="1" value="0" />
                <div class="param-axis">
                  <span>холоднее</span><span>теплее</span>
                </div>
              </div>
              <div class="param-row">
                <div class="param-label">
                  <span>Оттенок</span>
                  <span class="param-val" id="tint-val">0</span>
                </div>
                <input type="range" id="tint" min="-100" max="100" step="1" value="0" />
                <div class="param-axis">
                  <span>зелёный</span><span>пурпурный</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
